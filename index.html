<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --black:        #0f0f0f;
    --near-black:   #1a1a14;
    --olive:        #8b8a3a;
    --olive-dark:   #5c5b26;
    --olive-light:  #b0af55;
    --olive-bg:     #2a2a12;
    --copper:       #9a5c22;
    --copper-light: #c8843c;
    --cream:        #f0ead8;
    --cream-dim:    #b8b29a;
    --yellow:       #f5c820;
    --open-green:   #5dbb6a;
    --border:       #3a3a1a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--black);
    color: var(--cream);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--black);
    border-bottom: 3px solid var(--olive);
  }

  .header-stripe {
    height: 6px;
    background: repeating-linear-gradient(
      90deg,
      var(--olive-dark) 0px, var(--olive-dark) 30px,
      var(--yellow)     30px, var(--yellow)     60px
    );
  }

  .header-inner {
    padding: 14px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo-block {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .shield {
    width: 48px;
    height: 54px;
    flex-shrink: 0;
  }

  .logo-text h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.2rem;
    letter-spacing: 3px;
    color: var(--cream);
    line-height: 1;
  }

  .logo-text h1 span { color: var(--yellow); }

  .logo-text p {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.68rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--cream);
    margin-top: 3px;
  }

  .live-time { text-align: right; }

  .live-time .time-display {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.9rem;
    color: var(--yellow);
    line-height: 1;
  }

  .live-time .date-display {
    font-size: 0.65rem;
    color: var(--olive-light);
    letter-spacing: 2px;
    text-transform: uppercase;
    font-family: 'Barlow Condensed', sans-serif;
  }

  /* ── COPPER SPOTLIGHT BANNER ── */
  .spotlight-banner {
    background: linear-gradient(90deg,
      var(--olive-dark)   0%,
      var(--copper)       30%,
      var(--copper-light) 50%,
      var(--copper)       70%,
      var(--olive-dark)   100%
    );
    padding: 9px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 2px solid var(--olive-dark);
  }

  .spotlight-banner .tagline {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 3px;
    color: var(--cream);
    text-shadow: 1px 1px 3px rgba(0,0,0,0.6);
  }

  .open-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(0,0,0,0.35);
    padding: 4px 12px;
    border-radius: 2px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--cream);
  }

  .pulse-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--open-green);
    animation: pulse 2s infinite;
    flex-shrink: 0;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.3; }
  }

  /* ── DAY SELECTOR ── */
  .day-bar {
    padding: 10px 14px 0;
    display: flex;
    gap: 8px;
    background: var(--black);
    border-bottom: none;
  }

  .day-btn {
    padding: 7px 22px;
    border-radius: 2px 2px 0 0;
    border: 1.5px solid var(--olive-dark);
    border-bottom: none;
    background: transparent;
    color: var(--olive-light);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .day-btn:hover {
    color: var(--yellow);
    border-color: var(--yellow);
  }

  .day-btn.active {
    background: var(--olive-dark);
    border-color: var(--olive);
    color: var(--yellow);
  }

  /* ── FILTERS ── */
  .filter-bar {
    padding: 11px 14px;
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
    background: var(--near-black);
    border-bottom: 1px solid var(--border);
  }

  .filter-bar::-webkit-scrollbar { display: none; }

  .filter-btn {
    flex-shrink: 0;
    padding: 6px 16px;
    border-radius: 2px;
    border: 1.5px solid var(--olive-dark);
    background: transparent;
    color: var(--olive-light);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
  }

  .filter-btn:hover {
    border-color: var(--yellow);
    color: var(--yellow);
  }

  .filter-btn.active {
    background: var(--yellow);
    border-color: var(--yellow);
    color: var(--black);
  }

  /* ── CARDS ── */
  .cards-container {
    padding: 14px 14px 30px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    max-width: 600px;
    margin: 0 auto;
  }

  .business-card {
    background: var(--olive-bg);
    border: 1px solid var(--border);
    border-radius: 3px;
    overflow: hidden;
    animation: slideIn 0.25s ease both;
  }

  .business-card.is-open {
    border-left: 4px solid var(--open-green);
  }

  .business-card.is-featured {
    border: 1px solid var(--olive);
    box-shadow: 0 0 12px rgba(139,138,58,0.2);
  }

  .business-card.is-featured.is-open {
    border-left: 4px solid var(--open-green);
  }

  .business-card.is-featured.is-closed {
    border-left: 4px solid #ff4433;
  }

  .card-shield {
    width: 18px;
    height: 20px;
    object-fit: contain;
    vertical-align: middle;
    margin-left: 6px;
    display: inline-block;
    position: relative;
    top: -2px;
  }

  .business-card.is-closed {
    border-left: 4px solid #ff4433;
    opacity: 0.65;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-main {
    padding: 13px 15px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
  }

  .card-left { flex: 1; min-width: 0; }

  .card-category {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.62rem;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--copper-light);
    margin-bottom: 3px;
  }

  .card-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.35rem;
    letter-spacing: 1px;
    color: var(--cream);
    line-height: 1.1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-desc {
    font-size: 0.78rem;
    color: var(--cream-dim);
    margin-top: 4px;
    line-height: 1.4;
  }

  .card-right {
    flex-shrink: 0;
    text-align: right;
  }

  .status-badge {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 2px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .status-badge.open {
    background: rgba(93,187,106,0.15);
    color: var(--open-green);
    border: 1px solid rgba(93,187,106,0.35);
  }

  .status-badge.closed {
    background: rgba(220,30,30,0.2);
    color: #ff4433;
    border: 1px solid rgba(220,30,30,0.5);
  }

  .hours-today {
    font-size: 0.72rem;
    color: var(--cream-dim);
    margin-top: 6px;
    font-family: 'Barlow Condensed', sans-serif;
    letter-spacing: 0.5px;
  }

  .card-footer {
    padding: 7px 15px;
    background: rgba(0,0,0,0.25);
    border-top: 1px solid var(--border);
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-items: center;
  }

  .card-tag {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.65rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--olive-light);
    background: rgba(0,0,0,0.3);
    padding: 2px 7px;
    border-radius: 2px;
    border: 1px solid var(--olive-dark);
  }

  .card-note {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.62rem;
    letter-spacing: 0.5px;
    color: var(--copper-light);
    font-style: italic;
  }

  .card-phone {
    margin-left: auto;
    font-size: 0.72rem;
    color: var(--cream-dim);
    text-decoration: none;
    font-family: 'Barlow Condensed', sans-serif;
  }

  .card-phone:hover { color: var(--yellow); }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    padding: 50px 20px;
    color: var(--olive-dark);
  }

  .empty-state .big-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 5rem;
    line-height: 1;
  }

  .empty-state p {
    margin-top: 8px;
    font-size: 0.85rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--olive-dark);
  }

  /* ── OFFER BANNER ── */
  .card-offer {
    padding: 8px 15px;
    background: linear-gradient(90deg, var(--olive-dark) 0%, var(--copper) 50%, var(--olive-dark) 100%);
    color: var(--cream);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 2px;
    text-align: center;
    border-top: 1px solid var(--olive);
  }

  /* ── ADDRESS ── */
  .card-address-link {
    display: block;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 0.5px;
    color: var(--olive-light);
    text-decoration: none;
    margin-top: 3px;
  }

  .card-address-link:hover {
    color: var(--yellow);
  }

  /* ── EVENT DATE HEADER ── */
  .event-date-header {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 2px;
    color: var(--yellow);
    padding: 10px 4px 4px;
    border-bottom: 1px solid var(--olive-dark);
    margin-bottom: 4px;
  }

  /* ── FOOTER ── */
  footer {
    text-align: center;
    padding: 20px 16px;
    color: var(--olive-dark);
    font-size: 0.68rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    font-family: 'Barlow Condensed', sans-serif;
    border-top: 1px solid var(--border);
    margin-top: 10px;
  }

  footer span { color: var(--copper-light); }
</style>
</head>

<script>
// ── GOOGLE SHEET URL ──
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQz1NlsZuZ0iQM0XBrctkDh28qbb4amrHvIGGf3RYR-wQCmM_BScxPf4q4GnBT_ugj9xkFJM3kGFxHB/pub?output=csv';
const EVENTS_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQz1NlsZuZ0iQM0XBrctkDh28qbb4amrHvIGGf3RYR-wQCmM_BScxPf4q4GnBT_ugj9xkFJM3kGFxHB/pub?gid=175459323&single=true&output=csv';

// Sheet columns: mon tue wed thu fri sat sun
// JS getDay(): 0=Sun,1=Mon,2=Tue,3=Wed,4=Thu,5=Fri,6=Sat
// Map: sheet index -> JS day: mon=1,tue=2,wed=3,thu=4,fri=5,sat=6,sun=0
const DAY_KEYS = ['mon','tue','wed','thu','fri','sat','sun'];
const SHEET_TO_JS = [1,2,3,4,5,6,0];

let businesses = [];
let events = [];
let currentFilter = 'all';
let dayOffset = 0; // 0=today, 1=tomorrow
let currentView = 'businesses'; // 'businesses' or 'events'

// Parse "7:00-21:00" into [7,0,21,0] or null if closed/empty
function parseHours(str) {
  if (!str) return null;
  const clean = str.replace(/['"]/g,'').trim().toLowerCase();
  if (clean === '' || clean === 'closed') return null;
  // Match pattern HH:MM-HH:MM
  const match = clean.match(/(\d+):(\d+)-(\d+):(\d+)/);
  if (!match) return null;
  return [parseInt(match[1]), parseInt(match[2]), parseInt(match[3]), parseInt(match[4])];
}

// Fetch CSV from Google Sheets and parse into business objects
async function loadFromSheet() {
  document.getElementById('cards').innerHTML = `<div class="empty-state"><p>Loading...</p></div>`;
  try {
    const res = await fetch(SHEET_URL);
    const csv = await res.text();
    // Cache fresh data
    try { localStorage.setItem('kicks66_cache', csv); localStorage.setItem('kicks66_cache_time', Date.now()); } catch(e) {}
    // Proper CSV parser that handles quoted commas
    const parseCSVRow = row => {
      const result = [];
      let cur = '';
      let inQuotes = false;
      for (let i = 0; i < row.length; i++) {
        const ch = row[i];
        if (ch === '"') { inQuotes = !inQuotes; }
        else if (ch === ',' && !inQuotes) { result.push(cur.trim()); cur = ''; }
        else { cur += ch; }
      }
      result.push(cur.trim());
      return result;
    };
    parseCSV(csv);
  } catch(e) {
    console.error('Sheet load error:', e);
    // Try cache fallback
    try {
      const cached = localStorage.getItem('kicks66_cache');
      if (cached) {
        parseCSV(cached);
        document.getElementById('offline-notice').style.display = 'block';
        return;
      }
    } catch(ce) {}
    document.getElementById('cards').innerHTML = `<div class="empty-state"><div class="big-num">66</div><p>Could not load businesses. Check connection.</p></div>`;
  }
}

function parseCSV(csv) {
  const parseCSVRow = row => {
    const result = [];
    let cur = '';
    let inQuotes = false;
    for (let i = 0; i < row.length; i++) {
      const ch = row[i];
      if (ch === '"') { inQuotes = !inQuotes; }
      else if (ch === ',' && !inQuotes) { result.push(cur.trim()); cur = ''; }
      else { cur += ch; }
    }
    result.push(cur.trim());
    return result;
  };

  const rows = csv.trim().split('\n').map(r => parseCSVRow(r));
  const headers = rows[0].map(h => h.toLowerCase().trim());

  businesses = rows.slice(1).filter(r => r[0] && r[0].trim() !== '').map(row => {
    const get = key => {
      const idx = headers.indexOf(key);
      return idx >= 0 ? (row[idx] || '').replace(/^"|"$/g,'').trim() : '';
    };
    const hours = {};
    DAY_KEYS.forEach((day, sheetIdx) => {
      const jsDay = SHEET_TO_JS[sheetIdx];
      hours[jsDay] = parseHours(get(day));
    });
    return {
      name:     get('name'),
      category: get('category').toLowerCase(),
      desc:     get('desc'),
      phone:    get('phone'),
      tags:     get('tags').split(',').map(t => t.trim()).filter(Boolean),
      note:     get('note'),
      offer:    get('offer'),
      featured: get('featured').toLowerCase() === 'yes',
      address:  get('address'),
      hours
    };
  });
  render();
}

async function loadEvents() {
  try {
    const res = await fetch(EVENTS_URL);
    const csv = await res.text();
    const parseCSVRow = row => {
      const result = [];
      let cur = '', inQuotes = false;
      for (let i = 0; i < row.length; i++) {
        const ch = row[i];
        if (ch === '"') { inQuotes = !inQuotes; }
        else if (ch === ',' && !inQuotes) { result.push(cur.trim()); cur = ''; }
        else { cur += ch; }
      }
      result.push(cur.trim());
      return result;
    };
    const rows = csv.trim().split('\n').map(r => parseCSVRow(r));
    const headers = rows[0].map(h => h.toLowerCase().trim());
    const today = new Date();
    today.setHours(0,0,0,0);
    events = rows.slice(1).filter(r => r[0] && r[0].trim() !== '').map(row => {
      const get = key => {
        const idx = headers.indexOf(key);
        return idx >= 0 ? (row[idx] || '').replace(/^"|"$/g,'').trim() : '';
      };
      return {
        title:    get('title'),
        date:     get('date'),
        time:     get('time'),
        location: get('location'),
        desc:     get('desc'),
        url:      get('url')
      };
    }).filter(e => {
      // Only show today and future events
      const eventDate = new Date(e.date + 'T00:00:00');
      return eventDate >= today;
    }).sort((a,b) => new Date(a.date) - new Date(b.date));
    try { localStorage.setItem('kicks66_events_cache', JSON.stringify(events)); } catch(e) {}
  } catch(err) {
    try {
      const cached = localStorage.getItem('kicks66_events_cache');
      if (cached) events = JSON.parse(cached);
    } catch(ce) {}
  }
}

function renderEvents() {
  const container = document.getElementById('cards');
  container.innerHTML = '';

  if (!events.length) {
    container.innerHTML = `<div class="empty-state"><div class="big-num">66</div><p>No upcoming events found</p></div>`;
    return;
  }

  let lastDate = '';
  events.forEach((e, i) => {
    // Date header
    const eventDate = new Date(e.date + 'T00:00:00');
    const today = new Date(); today.setHours(0,0,0,0);
    const tomorrow = new Date(today); tomorrow.setDate(today.getDate()+1);
    let dateLabel = eventDate.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });
    if (eventDate.getTime() === today.getTime()) dateLabel = 'Today — ' + dateLabel;
    else if (eventDate.getTime() === tomorrow.getTime()) dateLabel = 'Tomorrow — ' + dateLabel;

    if (dateLabel !== lastDate) {
      const header = document.createElement('div');
      header.className = 'event-date-header';
      header.textContent = dateLabel;
      container.appendChild(header);
      lastDate = dateLabel;
    }

    const card = document.createElement('div');
    card.className = 'business-card is-open';
    card.style.animationDelay = `${i * 0.05}s`;
    card.innerHTML = `
      <div class="card-main">
        <div class="card-left">
          <div class="card-category">event</div>
          <div class="card-name">${e.title}</div>
          <div class="card-desc">${e.desc}</div>
        </div>
        <div class="card-right">
          <span class="status-badge open">${e.time}</span>
          <a class="card-address-link" href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(e.location)}" target="_blank">${e.location}</a>
        </div>
      </div>
      ${e.url ? `<div class="card-footer"><a href="${e.url}" target="_blank" style="color:var(--olive-light);font-family:'Barlow Condensed',sans-serif;font-size:0.75rem;letter-spacing:1px;">More info →</a></div>` : ''}
    `;
    container.appendChild(card);
  });
}

function updateClock() {
  const now = new Date();
  const h = now.getHours();
  const m = now.getMinutes().toString().padStart(2,'0');
  const ampm = h >= 12 ? 'PM' : 'AM';
  const h12 = h % 12 || 12;
  document.getElementById('clock').textContent = `${h12}:${m} ${ampm}`;
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  document.getElementById('dayname').textContent = days[now.getDay()];
}

function getViewDay() {
  const d = new Date();
  d.setDate(d.getDate() + dayOffset);
  return d.getDay();
}

function isOpenNow(b) {
  const h = b.hours[getViewDay()];
  if (!h) return false;
  // For today check current time, for tomorrow just check if open at all
  if (dayOffset === 0) {
    const now = new Date();
    const cur = now.getHours() * 60 + now.getMinutes();
    return cur >= (h[0]*60+h[1]) && cur < (h[2]*60+h[3]);
  }
  return true; // tomorrow — open that day
}

function hoursText(b) {
  const h = b.hours[getViewDay()];
  if (!h) return dayOffset === 0 ? "Closed today" : "Closed tomorrow";
  const fmt = (hh, mm) => {
    const ap = hh >= 12 ? 'pm' : 'am';
    const h12 = hh % 12 || 12;
    return mm ? `${h12}:${mm.toString().padStart(2,'0')}${ap}` : `${h12}${ap}`;
  };
  return `${fmt(h[0],h[1])} – ${fmt(h[2],h[3])}`;
}

function statusLabel(b) {
  if (dayOffset === 0) return isOpenNow(b) ? 'Open' : 'Closed';
  return b.hours[getViewDay()] ? 'Open Tomorrow' : 'Closed Tomorrow';
}

function render() {
  const container = document.getElementById('cards');
  container.innerHTML = '';

  let list = businesses;
  if (currentFilter === 'open') list = businesses.filter(b => isOpenNow(b));
  else if (currentFilter !== 'all') list = businesses.filter(b => b.category === currentFilter);

  list = [...list].sort((a,b) => {
    // Featured always first
    if (b.featured && !a.featured) return 1;
    if (a.featured && !b.featured) return -1;
    // Then open before closed
    return isOpenNow(b) - isOpenNow(a);

        ${b.tags.map(t => `<span class="card-tag">${t}</span>`).join('')}

`;
    container.appendChild(card);
  });
}

document.querySelectorAll('.day-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if (btn.dataset.day === 'events') {
      currentView = 'events';
      document.getElementById('business-filters').style.display = 'none';
      document.getElementById('open-count').parentElement.parentElement.style.display = 'none';
      renderEvents();
    } else {
      currentView = 'businesses';
      dayOffset = parseInt(btn.dataset.day);
      document.getElementById('business-filters').style.display = 'flex';
      document.getElementById('open-count').parentElement.parentElement.style.display = 'flex';
      render();
    }
  });
});

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    render();
  });
});

updateClock();
loadFromSheet();
loadEvents();
setInterval(() => { updateClock(); }, 30000);
setInterval(() => { loadFromSheet(); }, 300000);

// Register service worker for PWA
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(e => console.log('SW error:', e));
}

// Handle Add to Home Screen prompt
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('install-banner').style.display = 'flex';
});

document.getElementById('install-btn').addEventListener('click', () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => {
      deferredPrompt = null;
      document.getElementById('install-banner').style.display = 'none';
    });
  }
});

document.getElementById('install-close').addEventListener('click', () => {
  document.getElementById('install-banner').style.display = 'none';
});
