<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --black:        #0f0f0f;
    --near-black:   #1a1a14;
    --olive:        #8b8a3a;
    --olive-dark:   #5c5b26;
    --olive-light:  #b0af55;
    --olive-bg:     #2a2a12;
    --copper:       #9a5c22;
    --copper-light: #c8843c;
    --cream:        #f0ead8;
    --cream-dim:    #b8b29a;
    --yellow:       #f5c820;
    --open-green:   #5dbb6a;
    --border:       #3a3a1a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--black);
    color: var(--cream);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--black);
    border-bottom: 3px solid var(--olive);
  }

  .header-stripe {
    height: 6px;
    background: repeating-linear-gradient(
      90deg,
      var(--olive-dark) 0px, var(--olive-dark) 30px,
      var(--yellow)     30px, var(--yellow)     60px
    );
  }

  .header-inner {
    padding: 14px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

<script>
// ── GOOGLE SHEET URL ──
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQz1NlsZuZ0iQM0XBrctkDh28qbb4amrHvIGGf3RYR-wQCmM_BScxPf4q4GnBT_ugj9xkFJM3kGFxHB/pub?output=csv';

// Sheet columns: mon tue wed thu fri sat sun
// JS getDay(): 0=Sun,1=Mon,2=Tue,3=Wed,4=Thu,5=Fri,6=Sat
// Map: sheet index -> JS day: mon=1,tue=2,wed=3,thu=4,fri=5,sat=6,sun=0
const DAY_KEYS = ['mon','tue','wed','thu','fri','sat','sun'];
const SHEET_TO_JS = [1,2,3,4,5,6,0];

let businesses = [];
let currentFilter = 'all';
let dayOffset = 0; // 0=today, 1=tomorrow

// Parse "7:00-21:00" into [7,0,21,0] or null if closed/empty
function parseHours(str) {
  if (!str) return null;
  const clean = str.replace(/['"]/g,'').trim().toLowerCase();
  if (clean === '' || clean === 'closed') return null;
  // Match pattern HH:MM-HH:MM
  const match = clean.match(/(\d+):(\d+)-(\d+):(\d+)/);
  if (!match) return null;
  return [parseInt(match[1]), parseInt(match[2]), parseInt(match[3]), parseInt(match[4])];
}

// Fetch CSV from Google Sheets and parse into business objects
async function loadFromSheet() {
  document.getElementById('cards').innerHTML = `<div class="empty-state"><p>Loading...</p></div>`;
  try {
    const res = await fetch(SHEET_URL);
    const csv = await res.text();
    // Proper CSV parser that handles quoted commas
    const parseCSVRow = row => {
      const result = [];
      let cur = '';
      let inQuotes = false;
      for (let i = 0; i < row.length; i++) {
        const ch = row[i];
        if (ch === '"') { inQuotes = !inQuotes; }
        else if (ch === ',' && !inQuotes) { result.push(cur.trim()); cur = ''; }
        else { cur += ch; }
      }
      result.push(cur.trim());
      return result;
    };
    const rows = csv.trim().split('\n').map(r => parseCSVRow(r));
    const headers = rows[0].map(h => h.toLowerCase().trim());

    businesses = rows.slice(1).filter(r => r[0] && r[0].trim() !== '').map(row => {
      const get = key => {
        const idx = headers.indexOf(key);
        return idx >= 0 ? (row[idx] || '').replace(/^"|"$/g,'').trim() : '';
      };
      const hours = {};
      // DAY_KEYS order: mon,tue,wed,thu,fri,sat,sun
      // SHEET_TO_JS maps each to JS getDay(): mon->1,tue->2,wed->3,thu->4,fri->5,sat->6,sun->0
      DAY_KEYS.forEach((day, sheetIdx) => {
        const jsDay = SHEET_TO_JS[sheetIdx];
        const val = get(day);
        hours[jsDay] = parseHours(val);
      });
      return {
        name:     get('name'),
        category: get('category').toLowerCase(),
        desc:     get('desc'),
        phone:    get('phone'),
        tags:     get('tags').split(',').map(t => t.trim()).filter(Boolean),
        note:     get('note'),
        offer:    get('offer'),
        featured: get('featured').toLowerCase() === 'yes',
        address:  get('address'),
        hours
      };
    });
    render();
  } catch(e) {
    console.error('Sheet load error:', e);
    document.getElementById('cards').innerHTML = `<div class="empty-state"><div class="big-num">66</div><p>Could not load businesses. Check connection.</p></div>`;
  }
}

function updateClock() {
  const now = new Date();
  const h = now.getHours();
  const m = now.getMinutes().toString().padStart(2,'0');
  const ampm = h >= 12 ? 'PM' : 'AM';
  const h12 = h % 12 || 12;
  document.getElementById('clock').textContent = `${h12}:${m} ${ampm}`;
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  document.getElementById('dayname').textContent = days[now.getDay()];
}

function getViewDay() {
  const d = new Date();
  d.setDate(d.getDate() + dayOffset);
  return d.getDay();
}

function isOpenNow(b) {
  const h = b.hours[getViewDay()];
  if (!h) return false;
  // For today check current time, for tomorrow just check if open at all
  if (dayOffset === 0) {
    const now = new Date();
    const cur = now.getHours() * 60 + now.getMinutes();
    return cur >= (h[0]*60+h[1]) && cur < (h[2]*60+h[3]);
  }
  return true; // tomorrow — open that day
}

function hoursText(b) {
  const h = b.hours[getViewDay()];
  if (!h) return dayOffset === 0 ? "Closed today" : "Closed tomorrow";
  const fmt = (hh, mm) => {
    const ap = hh >= 12 ? 'pm' : 'am';
    const h12 = hh % 12 || 12;
    return mm ? `${h12}:${mm.toString().padStart(2,'0')}${ap}` : `${h12}${ap}`;
  };
  return `${fmt(h[0],h[1])} – ${fmt(h[2],h[3])}`;
}

function statusLabel(b) {
  if (dayOffset === 0) return isOpenNow(b) ? 'Open' : 'Closed';
  return b.hours[getViewDay()] ? 'Open Tomorrow' : 'Closed Tomorrow';
}

function render() {
  const container = document.getElementById('cards');
  container.innerHTML = '';

  let list = businesses;
  if (currentFilter === 'open') list = businesses.filter(b => isOpenNow(b));
  else if (currentFilter !== 'all') list = businesses.filter(b => b.category === currentFilter);

  list = [...list].sort((a,b) => {
    // Featured always first
    if (b.featured && !a.featured) return 1;
    if (a.featured && !b.featured) return -1;
    // Then open before closed
    return isOpenNow(b) - isOpenNow(a);
  });
  document.getElementById('open-count').textContent = businesses.filter(b => isOpenNow(b)).length;

  if (!list.length) {
    container.innerHTML = `<div class="empty-state"><div class="big-num">66</div><p>Nothing here right now</p></div>`;
    return;
  }

  list.forEach((b, i) => {
    const open = isOpenNow(b);
    const card = document.createElement('div');
    card.className = `business-card ${open ? 'is-open' : 'is-closed'} ${b.featured ? 'is-featured' : ''}`;
    card.style.animationDelay = `${i * 0.05}s`;
    card.innerHTML = `
      <div class="card-main">
        <div class="card-left">
          <div class="card-category">${b.category}</div>

document.querySelectorAll('.day-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    dayOffset = parseInt(btn.dataset.day);
    render();
  });
});

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    render();
  });
});

updateClock();
loadFromSheet();
setInterval(() => { updateClock(); }, 30000);
setInterval(() => { loadFromSheet(); }, 300000); // reload sheet every 5 mins
</script>
